<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品折扣卡片 · SIMID</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: transparent;
      font-family: 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      pointer-events: none; /* 让点击穿透到视频，卡片内部会重设 */
    }
    .card-container {
      pointer-events: auto;
      width: 90%;
      max-width: 400px;
      margin-bottom: 20px;
      background: white;
      border-radius: 0; /* 直角 */
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .card-container.show {
      opacity: 1;
      transform: translateY(0);
    }
    /* 红色顶栏 */
    .card-header {
      background: #d32f2f;
      color: white;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 1rem;
      text-align: left;
      letter-spacing: 1px;
    }
    /* 卡片主体 */
    .card-body {
      display: flex;
      padding: 12px 16px;
      align-items: center;
      gap: 12px;
    }
    /* 左侧正方形图片占位 */
    .product-image {
      width: 90px;
      height: 90px;
      min-width: 90px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 0.8rem;
    }
    /* 右侧信息 */
    .product-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .product-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: #222;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.3;
    }
    .sales {
      font-size: 0.8rem;
      color: #888;
      margin: 2px 0;
    }
    .price {
      font-weight: 700;
      font-size: 1.2rem;
      color: #e53935;
    }
    .original-price {
      font-size: 0.75rem;
      text-decoration: line-through;
      color: #aaa;
      margin-left: 6px;
      font-weight: 400;
    }
    .shop-btn {
      background: #e53935;
      color: white;
      border: none;
      padding: 8px 18px;
      font-weight: 700;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 6px;
      align-self: flex-start;
      letter-spacing: 0.5px;
    }
    .shop-btn:active {
      background: #b71c1c;
    }
  </style>
</head>
<body>
  <div class="card-container" id="discountCard">
    <div class="card-header">Hot Sale</div>
    <div class="card-body">
      <div class="product-image">📷 图片</div>
      <div class="product-info">
        <div class="product-title">高品质无线降噪耳机 · 旗舰版</div>
        <div class="sales">🔥 已售 2.3万+</div>
        <div>
          <span class="price">¥199</span>
          <span class="original-price">¥499</span>
        </div>
        <button class="shop-btn" id="shopNowBtn">Shop Now</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * SIMID 折扣卡片创意
     * 参考 Google SIMID Survey 示例的通信协议
     */
    (function() {
      // 通信辅助
      let sessionId = '';
      let messageIdCounter = 0;

      const sendMessage = (type, args = {}) => {
        const msg = {
          type: type,
          sessionId: sessionId,
          messageId: ++messageIdCounter,
          timestamp: Date.now(),
          args: args
        };
        console.log('[折扣卡片] 发送:', msg);
        window.parent.postMessage(JSON.stringify(msg), '*');
      };

      const resolveMessage = (msgId, value = {}) => {
        sendMessage('resolve', { messageId: msgId, value: value });
      };

      const rejectMessage = (msgId, error = { errorCode: 0, message: '' }) => {
        sendMessage('reject', { messageId: msgId, value: error });
      };

      // 卡片 DOM
      const card = document.getElementById('discountCard');
      const shopBtn = document.getElementById('shopNowBtn');

      // 显示/隐藏
      function showCard() {
        card.classList.add('show');
      }
      function hideCard() {
        card.classList.remove('show');
      }

      // 处理来自播放器的消息
      window.addEventListener('message', function(event) {
        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch (e) {
          return;
        }

        // 仅处理与当前会话相关（createSession 除外）
        if (msg.type !== 'createSession' && msg.sessionId !== sessionId) return;

        console.log('[折扣卡片] 收到:', msg);

        switch (msg.type) {
          case 'createSession':
            sessionId = msg.args.sessionId;
            resolveMessage(msg.messageId, {});
            break;

          case 'SIMID:Player:init':
            // 保存 creativeData 和 environmentData 以备后用
            resolveMessage(msg.messageId, {});
            break;

          case 'SIMID:Player:startCreative':
            showCard();
            resolveMessage(msg.messageId, {});
            break;

          case 'SIMID:Player:adStopped':
          case 'SIMID:Player:adSkipped':
            hideCard();
            resolveMessage(msg.messageId, {});
            break;

          // 忽略其他事件，但必须 resolve 避免超时
          default:
            if (msg.messageId) {
              resolveMessage(msg.messageId, {});
            }
            break;
        }
      });

      // 按钮点击：请求跳过广告（或打开落地页）
      shopBtn.addEventListener('click', function() {
        console.log('[折扣卡片] Shop Now 点击');
        // 发送请求跳过广告，播放器通常会结束广告并跳转
        sendMessage('SIMID:Creative:requestSkip');
        // 同时尝试直接打开（降级）
        window.open('https://www.example.com/product/headphone', '_blank');
      });

      // 启动创意：发送 createSession 建立连接
      console.log('[折扣卡片] 创意加载完成，发送 createSession');
      setTimeout(() => {
        sendMessage('createSession', {});
      }, 50);
    })();
  </script>
</body>
</html>
