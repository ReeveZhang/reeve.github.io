<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Temu test</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: transparent;
        font-family:
          "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        align-items: flex-start;
        pointer-events: none;
      }
      .card-container {
        pointer-events: auto;
        width: 90%;
        max-width: 400px;
        margin-bottom: 20px;
        margin-left: 16px;
        background: white;
        border-radius: 0;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        opacity: 0;
        transform: translateX(-30px);
        transition:
          opacity 0.4s ease,
          transform 0.4s ease;
      }
      .card-container.show {
        opacity: 1;
        transform: translateX(0);
      }
      .card-header {
        background: #ff7700;
        color: white;
        padding: 8px 16px;
        font-weight: 700;
        font-size: 1rem;
        text-align: left;
        letter-spacing: 1px;
      }
      .card-body {
        display: flex;
        padding: 12px 16px;
        align-items: center;
        gap: 12px;
      }
      .product-image {
        width: 90px;
        height: 90px;
        min-width: 90px;
        object-fit: cover;
        border: 1px solid #ddd;
        background: #f0f0f0;
      }
      .product-info {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
      }
      .product-title {
        font-weight: 600;
        font-size: 0.95rem;
        color: #222;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        line-height: 1.3;
      }
      .sales {
        font-size: 0.8rem;
        color: #888;
        margin: 2px 0;
      }
      .price-row {
        display: flex;
        align-items: baseline;
        flex-wrap: wrap;
      }
      .price {
        font-weight: 700;
        font-size: 1.2rem;
        color: #ff7700;
      }
      .original-price {
        font-size: 0.75rem;
        text-decoration: line-through;
        color: #aaa;
        margin-left: 6px;
        font-weight: 400;
      }
      .shop-btn {
        background: #ff7700;
        color: white;
        border: none;
        padding: 8px 18px;
        font-weight: 700;
        font-size: 0.85rem;
        border-radius: 4px;
        cursor: pointer;
        align-self: flex-end;
        margin-top: 4px;
      }
      .shop-btn:active {
        background: #ff7700;
      }
    </style>
  </head>
  <body>
    <div class="card-container" id="discountCard">
      <div class="card-header">Hot Sale</div>
      <div class="card-body">
        <img
          class="product-image"
          src="https://img.kwcdn.com/product/fancy/25afa702-590b-45cc-b0de-66ae40c9fd18.jpg?imageView2/2/w/500/q/70/format/avif"
          alt="image"
        />
        <div class="product-info">
          <div class="product-title">
            66-in-1 Ratchet Screwdriver Set with 62 Magnetic Bits (PH0-TX135) - Professional Electronics Repair Tool Kit, Precision Multi-Function Handle & Magnetizer Tool for Smartphones, Watches, Laptops, Glasses - Portable Screwdriver Kit for DIY &, Toolkit
          </div>
          <div class="sales">62 sold</div>
          <div class="price-row">
            <span class="price">¥16.27</span>
            <span class="original-price">¥75.66</span>
          </div>
          <button class="shop-btn" id="shopNowBtn">Shop Now</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        let sessionId = "";
        let messageIdCounter = 0;

        const sendMessage = (type, args = {}) => {
          const msg = {
            type: type,
            sessionId: sessionId,
            messageId: ++messageIdCounter,
            timestamp: Date.now(),
            args: args,
          };
          window.parent.postMessage(JSON.stringify(msg), "*");
        };
        const resolveMessage = (msgId, value = {}) => {
          sendMessage("resolve", { messageId: msgId, value: value });
        };
        const card = document.getElementById("discountCard");
        const shopBtn = document.getElementById("shopNowBtn");

        function showCard() {
          card.classList.add("show");
        }
        function hideCard() {
          card.classList.remove("show");
        }

        window.addEventListener("message", function (event) {
          let msg;
          try {
            msg = JSON.parse(event.data);
          } catch (e) {
            return;
          }
          if (msg.type !== "createSession" && msg.sessionId !== sessionId)
            return;

          switch (msg.type) {
            case "createSession":
              sessionId = msg.args.sessionId;
              resolveMessage(msg.messageId, {});
              break;
            case "SIMID:Player:init":
              resolveMessage(msg.messageId, {});
              break;
            case "SIMID:Player:startCreative":
              showCard();
              resolveMessage(msg.messageId, {});
              break;
            case "SIMID:Player:adStopped":
            case "SIMID:Player:adSkipped":
              hideCard();
              resolveMessage(msg.messageId, {});
              break;
            default:
              if (msg.messageId) {
                resolveMessage(msg.messageId, {});
              }
              break;
          }
        });

        shopBtn.addEventListener("click", function () {
          sendMessage("SIMID:Creative:requestSkip");
          window.open(
            "https://www.temu.com/ul/kuiper/un1.html?subj=feed-un&_bg_fs=1&_p_mat1_type=1&_p_jump_id=725&_x_vst_scene=adg&goods_id=601101903134543&adg_ctx=a-2a3f2591~t-ik66&_x_ns_goods_id=601101903134543&_p_rfs=1",
            "_blank",
          );
        });

        setTimeout(() => {
          sendMessage("createSession", {});
        }, 50);
      })();
    </script>
  </body>
</html>
